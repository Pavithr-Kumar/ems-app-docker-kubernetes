apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql-deployment
  labels:
    app: mysql

spec:
  replicas: 1

  selector:
    matchLabels:
      app: mysql

  template:
    metadata:
      labels:
        app: mysql

    spec:
      containers:
        - name: mysql-container
          image: mysql:8.0

          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-credentials
                  key: mysql-root-password

            - name: MYSQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: mysql-credentials
                  key: mysql-database

          ports:
            - name: mysql-port
              containerPort: 3306
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-service

spec:
  type: ClusterIP  # Internal service

  selector:
    app: mysql

  ports:
    - port: 3306
      targetPort: 3306